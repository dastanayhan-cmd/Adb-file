<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İzmir (ADB) İç Hatlar Giden Yolcu</title>
    <style>
        body {
            background-color: #121212;
            color: #e0e0e0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 15px;
        }
        .board-container {
            max-width: 1000px;
            margin: 0 auto;
            background-color: #1e1e1e;
            border-radius: 8px;
            padding: 20px;
            box-shadow: 0 8px 24px rgba(0,0,0,0.6);
        }
        h2 {
            text-align: center;
            color: #fca311; 
            margin-bottom: 25px;
            text-transform: uppercase;
            letter-spacing: 1.5px;
            font-size: 1.6em;
            border-bottom: 2px solid #333;
            padding-bottom: 15px;
        }
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 16px;
            min-width: 750px; 
        }
        th {
            background-color: #2c2c2c;
            color: #ffffff;
            padding: 15px 12px;
            text-align: left;
            text-transform: uppercase;
            white-space: nowrap;
            letter-spacing: 1px;
        }
        td {
            padding: 14px 12px;
            border-bottom: 1px solid #2a2a2a;
        }
        tbody tr:nth-child(even) {
            background-color: #242424;
        }
        tbody tr:hover {
            background-color: #383838;
            transition: background-color 0.2s ease;
        }
        .gate-number {
            font-size: 1.15em;
            font-weight: bold;
            color: #ffffff;
            background-color: #444;
            padding: 5px 12px;
            border-radius: 4px;
            border-left: 4px solid #fca311; /* Kapıyı biraz daha belirginleştirmek için ufak bir çizgi */
        }
        .status {
            font-weight: bold;
            letter-spacing: 0.5px;
        }
        .loading {
            text-align: center;
            padding: 30px;
            color: #888;
            font-size: 1.1em;
        }
        .last-update {
            text-align: right;
            font-size: 13px;
            color: #777;
            margin-top: 20px;
            font-style: italic;
        }

        @media (max-width: 600px) {
            body { padding: 10px; }
            .board-container { padding: 15px; }
            h2 { font-size: 1.3em; }
            td, th { padding: 12px 8px; font-size: 14px; }
        }
    </style>
</head>
<body>

<div class="board-container">
    <h2>✈️ İZMİR (ADB) İÇ HATLAR GİDEN YOLCU</h2>
    
    <div class="table-responsive">
        <div id="flight-data"><div class="loading">Uçuş verileri çekiliyor... Lütfen bekleyin.</div></div>
    </div>
    
    <div id="last-update-time" class="last-update"></div>
</div>

<script>
    const API_KEY = 'ce1d5a7e0fdf1ed4b76a7650207c58cd'; 
    const AIRPORT_IATA = 'ADB';

    const statusTranslations = {
        'scheduled': '<span style="color:#4db8ff;">Planlandı</span>',
        'active': '<span style="color:#2ecc71;">Havada</span>',
        'delayed': '<span style="color:#f39c12;">Gecikmeli</span>',
        'cancelled': '<span style="color:#e74c3c;">İptal Edildi</span>',
        'landed': '<span style="color:#95a5a6;">İndi</span>',
        'diverted': '<span style="color:#f39c12;">Yönlendirildi</span>',
        'incident': '<span style="color:#e74c3c;">Acil Durum</span>',
        'unknown': 'Bilinmiyor'
    };

    async function fetchFlights() {
        const timestamp = new Date().getTime();
        const targetUrl = `http://api.aviationstack.com/v1/flights?access_key=${API_KEY}&dep_iata=${AIRPORT_IATA}&_=${timestamp}`;
        const apiUrl = `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl)}`;

        try {
            const response = await fetch(apiUrl);
            if (!response.ok) throw new Error(`Sunucu Hatası: ${response.status}`);

            const data = await response.json();
            if (data.error) throw new Error(`API Hatası: ${data.error.info || 'Bilinmeyen hata'}`);

            if (data && data.data) {
                renderTable(data.data);
            } else {
                document.getElementById('flight-data').innerHTML = '<div class="loading">Şu an gösterilecek uçuş bulunmuyor.</div>';
            }
        } catch (error) {
            document.getElementById('flight-data').innerHTML = `<div class="loading" style="color:#e74c3c;">Bağlantı Başarısız. Veriler güncelleniyor, lütfen bekleyin...</div>`;
        }
    }

    function renderTable(flights) {
        const allowedGates = ['237', '238', '239', '240', '241', '242'];
        
        // Filtreleme
        let filteredFlights = flights.filter(flight => {
            const rawStatus = flight.flight_status;
            const gate = (flight.departure && flight.departure.gate) ? String(flight.departure.gate) : '';
            return allowedGates.includes(gate) && ['scheduled', 'active', 'delayed', 'cancelled'].includes(rawStatus);
        });

        // Saate göre sıralama
        filteredFlights.sort((a, b) => {
            const timeA = new Date(a.departure.scheduled || 0).getTime();
            const timeB = new Date(b.departure.scheduled || 0).getTime();
            return timeA - timeB;
        });

        // Tablo Sütun Başlıkları Güncellendi
        let html = `
            <table>
                <thead>
                    <tr>
                        <th>Tarih & Saat</th>
                        <th>Kapı</th>
                        <th>Firma</th>
                        <th>Nereye</th>
                        <th>Uçuş No</th>
                        <th>Durum</th>
                    </tr>
                </thead>
                <tbody>
        `;

        if (filteredFlights.length === 0) {
            html += `<tr><td colspan="6" style="text-align:center; padding:30px; color:#888;">Belirtilen kapılarda şu an için planlanmış bir uçuş bulunmuyor.</td></tr>`;
        } else {
            filteredFlights.forEach(flight => {
                let time = '--:--';
                if (flight.departure.scheduled) {
                    const dateObj = new Date(flight.departure.scheduled);
                    time = new Intl.DateTimeFormat('tr-TR', {
                        timeZone: 'Europe/Istanbul',
                        day: '2-digit',
                        month: 'short',
                        hour: '2-digit',
                        minute: '2-digit'
                    }).format(dateObj); 
                }

                const dest = (flight.arrival && flight.arrival.airport) 
                             ? flight.arrival.airport 
                             : ((flight.arrival && flight.arrival.iata) ? flight.arrival.iata.toUpperCase() : 'BİLİNMİYOR');

                const airlineName = (flight.airline && flight.airline.name) ? flight.airline.name : 'Bilinmiyor';
                const flightNo = (flight.flight && flight.flight.iata) ? flight.flight.iata : '-';
                const gate = flight.departure.gate;
                const statusHtml = statusTranslations[flight.flight_status] || flight.flight_status.toUpperCase();

                // Sütun Verileri Güncellendi
                html += `
                    <tr>
                        <td style="white-space: nowrap; color:#ddd;">${time}</td>
                        <td><span class="gate-number">${gate}</span></td>
                        <td style="color:#bbb;">${airlineName}</td>
                        <td style="font-weight: 600; font-size: 1.05em; color:#fff;">${dest}</td>
                        <td style="color:#aaa;">${flightNo}</td>
                        <td class="status">${statusHtml}</td>
                    </tr>
                `;
            });
        }

        html += '</tbody></table>';
        document.getElementById('flight-data').innerHTML = html;
        
        const now = new Date();
        const updateTime = new Intl.DateTimeFormat('tr-TR', {
            timeZone: 'Europe/Istanbul',
            day: 'numeric',
            month: 'long',
            hour: '2-digit',
            minute: '2-digit',
            second: '2-digit'
        }).format(now);
        
        document.getElementById('last-update-time').innerText = `Son Güncelleme: ${updateTime}`;
    }

    fetchFlights();
    setInterval(fetchFlights, 300000); 
</script>

</body>
</html>
