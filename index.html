<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>İzmir (ADB) Giden Yolcu Ekranı</title>
    <style>
        body {
            background-color: #0a0a0a;
            color: #ffffff;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 15px;
        }
        .board-container {
            max-width: 1000px;
            margin: 0 auto;
            background-color: #1a1a1a;
            border-radius: 10px;
            padding: 20px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.5);
        }
        h2 {
            text-align: center;
            color: #00e5ff;
            margin-bottom: 20px;
            text-transform: uppercase;
            letter-spacing: 2px;
            font-size: 1.5em;
        }
        .table-responsive {
            width: 100%;
            overflow-x: auto;
            -webkit-overflow-scrolling: touch;
        }
        table {
            width: 100%;
            border-collapse: collapse;
            font-size: 15px;
            min-width: 700px; 
        }
        th {
            background-color: #333;
            color: #aaa;
            padding: 12px;
            text-align: left;
            border-bottom: 2px solid #555;
            text-transform: uppercase;
            white-space: nowrap;
        }
        td {
            padding: 12px;
            border-bottom: 1px solid #333;
        }
        tr:hover {
            background-color: #2a2a2a;
        }
        .highlight-gate {
            background-color: rgba(255, 0, 0, 0.15) !important;
            color: #ff3333;
            font-weight: 900;
            font-size: 1.05em;
            border-left: 5px solid #ff0000;
        }
        .highlight-gate td {
            text-shadow: 0 0 5px rgba(255, 0, 0, 0.4);
        }
        .status {
            font-weight: bold;
        }
        .loading {
            text-align: center;
            padding: 20px;
            color: #aaa;
            font-style: italic;
        }
        .last-update {
            text-align: right;
            font-size: 12px;
            color: #666;
            margin-top: 15px;
        }

        @media (max-width: 600px) {
            body { padding: 10px; }
            .board-container { padding: 10px; }
            h2 { font-size: 1.2em; }
            td, th { padding: 10px 8px; }
        }
    </style>
</head>
<body>

<div class="board-container">
    <h2>✈️ İZMİR (ADB) GİDEN YOLCU EKRANI</h2>
    
    <div class="table-responsive">
        <div id="flight-data"><div class="loading">Uçuş verileri çekiliyor... Lütfen bekleyin.</div></div>
    </div>
    
    <div id="last-update-time" class="last-update"></div>
</div>

<script>
    const API_KEY = 'ce1d5a7e0fdf1ed4b76a7650207c58cd'; 
    const AIRPORT_IATA = 'ADB';

    const statusTranslations = {
        'scheduled': '<span style="color:#00e5ff;">Planlandı</span>',
        'active': '<span style="color:#00ff00;">Havada</span>',
        'delayed': '<span style="color:#ffa500;">Gecikmeli</span>',
        'cancelled': '<span style="color:#ff3333;">İptal Edildi</span>',
        'landed': '<span style="color:#aaaaaa;">İndi</span>',
        'diverted': '<span style="color:#ffa500;">Yönlendirildi</span>',
        'incident': '<span style="color:#ff3333;">Acil Durum</span>',
        'unknown': 'Bilinmiyor'
    };

    async function fetchFlights() {
        const timestamp = new Date().getTime();
        const targetUrl = `http://api.aviationstack.com/v1/flights?access_key=${API_KEY}&dep_iata=${AIRPORT_IATA}&_=${timestamp}`;
        
        // Önceki proxy çöktüğü için alternatif, daha hızlı çalışan bir proxy'e (CodeTabs) geçtik
        const apiUrl = `https://api.codetabs.com/v1/proxy?quest=${encodeURIComponent(targetUrl)}`;

        try {
            const response = await fetch(apiUrl);
            
            if (!response.ok) throw new Error(`Sunucu Hatası: ${response.status}`);

            // Bu proxy veriyi direkt JSON olarak veriyor, dönüştürmeye gerek yok
            const data = await response.json();
            
            if (data.error) throw new Error(`API Hatası: ${data.error.info || 'Bilinmeyen hata'}`);

            if (data && data.data) {
                renderTable(data.data);
            } else {
                document.getElementById('flight-data').innerHTML = '<div class="loading">Şu an planlanan aktif uçuş bulunmuyor.</div>';
            }
        } catch (error) {
            document.getElementById('flight-data').innerHTML = `<div class="loading" style="color:#ff4444;"><b>Bağlantı Başarısız:</b> ${error.message} <br><br><small>Tarayıcınız veya internet sağlayıcınız bağlantıyı engelliyor olabilir. Sayfayı yenilemeyi deneyin.</small></div>`;
            console.error(error);
        }
    }

    function renderTable(flights) {
        let html = `
            <table>
                <thead>
                    <tr>
                        <th>Saat</th>
                        <th>Nereye</th>
                        <th>Firma</th>
                        <th>Uçuş No</th>
                        <th>Kapı</th>
                        <th>Durum</th>
                    </tr>
                </thead>
                <tbody>
        `;

        const targetGates = ['239', '240', '241', '242'];
        let activeFlightsCount = 0;

        flights.forEach(flight => {
            const rawStatus = flight.flight_status;
            
            if (['scheduled', 'active', 'delayed', 'cancelled'].includes(rawStatus)) {
                activeFlightsCount++;
                
                let time = '--:--';
                if (flight.departure.scheduled) {
                    const dateObj = new Date(flight.departure.scheduled);
                    time = new Intl.DateTimeFormat('tr-TR', {
                        timeZone: 'Europe/Istanbul',
                        hour: '2-digit',
                        minute: '2-digit'
                    }).format(dateObj);
                }

                const dest = (flight.arrival && flight.arrival.airport) 
                             ? flight.arrival.airport 
                             : ((flight.arrival && flight.arrival.iata) ? flight.arrival.iata.toUpperCase() : 'BİLİNMİYOR');

                const airlineName = (flight.airline && flight.airline.name) ? flight.airline.name : 'Bilinmiyor';
                const flightNo = (flight.flight && flight.flight.iata) ? flight.flight.iata : '-';
                const gate = (flight.departure && flight.departure.gate) ? String(flight.departure.gate) : 'Belli Değil';
                
                const statusHtml = statusTranslations[rawStatus] || rawStatus.toUpperCase();

                const isTarget = targetGates.includes(gate);
                const rowClass = isTarget ? 'class="highlight-gate"' : '';
                const gateDisplay = isTarget ? `➔ KAPI ${gate}` : gate;

                html += `
                    <tr ${rowClass}>
                        <td>${time}</td>
                        <td style="font-weight: 500;">${dest}</td>
                        <td>${airlineName}</td>
                        <td>${flightNo}</td>
                        <td><strong>${gateDisplay}</strong></td>
                        <td class="status">${statusHtml}</td>
                    </tr>
                `;
            }
        });

        if (activeFlightsCount === 0) {
            html += `<tr><td colspan="6" style="text-align:center; padding:20px;">Şu an için gösterilecek uçuş bulunmuyor.</td></tr>`;
        }

        html += '</tbody></table>';
        document.getElementById('flight-data').innerHTML = html;
        
        const now = new Date();
        const updateTime = new Intl.DateTimeFormat('tr-TR', {
            timeZone: 'Europe/Istanbul',
            hour: '2-digit',
            minute: '2-digit'
        }).format(now);
        
        document.getElementById('last-update-time').innerText = `Son Güncelleme: ${updateTime}`;
    }

    fetchFlights();
    setInterval(fetchFlights, 300000); 
</script>

</body>
</html>
